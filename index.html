<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmolVLM Vision Studio</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>SmolVLM Vision Studio</h1>
            <div id="statusIndicator" class="status-inactive">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
                <span id="fpsDisplay" style="margin-left: 1rem; color: var(--success); font-size: 0.8rem; font-weight: 600; font-family: monospace;"></span>
            </div>
        </header>

        <div class="viewer-card">
            <div class="mode-tabs">
                <div class="mode-tab active" onclick="switchMode('live')">Live Webcam</div>
                <div class="mode-tab" onclick="switchMode('upload')">Image Upload</div>
                <div class="mode-tab" onclick="switchMode('video')">Video Upload</div>
            </div>

            <div class="viewer-wrapper">
                <video id="videoFeed" autoplay playsinline></video>
                <video id="videoPlayer" class="hidden" controls playsinline></video>
                <img id="imagePreview" class="hidden" alt="Uploaded Image">
                <canvas id="detectionCanvas"></canvas>
            </div>
            
            <div id="uploadControls" class="control-group hidden" style="margin-top: 1.5rem;">
                <label for="imageUpload">Select Image</label>
                <input type="file" id="imageUpload" accept="image/*" class="hidden">
                <button class="btn btn-upload" onclick="document.getElementById('imageUpload').click()">
                    <span>Click to upload image</span>
                </button>
            </div>

            <div id="videoUploadControls" class="control-group hidden" style="margin-top: 1.5rem;">
                <label for="videoUpload">Select Video</label>
                <input type="file" id="videoUpload" accept="video/*" class="hidden">
                <button class="btn btn-upload" onclick="document.getElementById('videoUpload').click()">
                    <span>Click to upload video</span>
                </button>
            </div>
        </div>

        <div class="controls-panel">
            <div class="control-group">
                <label for="baseURL">API Endpoint</label>
                <input type="text" id="baseURL" value="http://localhost:8080">
            </div>

            <div class="control-group">
                <label for="imageMarker">Special Marker</label>
                <input type="text" id="imageMarker" value="<image>" placeholder="<image>">
            </div>

            <div class="control-group">
                <label for="instructionText">Instruction</label>
                <textarea id="instructionText" placeholder="What do you see?">What do you see?</textarea>
            </div>

            <button id="actionButton" class="btn btn-primary">Start Live Stream</button>
            <button id="processImageButton" class="btn btn-primary hidden">Analyze Image</button>
            <button id="videoInferenceButton" class="btn btn-primary hidden">Start Video Inference</button>
        </div>

        <div class="response-card">
            <label>Model Response</label>
            <textarea id="responseText" readonly placeholder="Waiting for inference..."></textarea>
            <div id="debugStatus" style="margin-top: 10px; font-size: 11px; color: #6366f1;"></div>
        </div>
    </div>

    <canvas id="processingCanvas" class="hidden"></canvas>

    <script>
        const video = document.getElementById('videoFeed');
        const videoPlayer = document.getElementById('videoPlayer');
        const imagePreview = document.getElementById('imagePreview');
        const detectionCanvas = document.getElementById('detectionCanvas');
        const processingCanvas = document.getElementById('processingCanvas');
        const baseURL = document.getElementById('baseURL');
        const imageMarker = document.getElementById('imageMarker');
        const instructionText = document.getElementById('instructionText');
        const responseText = document.getElementById('responseText');
        const debugStatus = document.getElementById('debugStatus');
        const actionButton = document.getElementById('actionButton');
        const processImageButton = document.getElementById('processImageButton');
        const videoInferenceButton = document.getElementById('videoInferenceButton');
        const imageUpload = document.getElementById('imageUpload');
        const videoUpload = document.getElementById('videoUpload');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        let lastInferenceTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        let currentMode = 'live';
        let stream;
        let intervalId;
        let isProcessing = false;
        let uploadedImageBase64 = null;

        function switchMode(mode) {
            currentMode = mode;
            handleStop();
            
            // Map modes to tab labels to ensure precise matching
            const modeMap = {
                'live': 'Live Webcam',
                'upload': 'Image Upload',
                'video': 'Video Upload'
            };

            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent === modeMap[mode]);
            });
            
            // Hide everything first
            video.classList.add('hidden');
            videoPlayer.classList.add('hidden');
            imagePreview.classList.add('hidden');
            document.getElementById('uploadControls').classList.add('hidden');
            document.getElementById('videoUploadControls').classList.add('hidden');
            actionButton.classList.add('hidden');
            processImageButton.classList.add('hidden');
            videoInferenceButton.classList.add('hidden');

            if (mode === 'live') {
                video.classList.remove('hidden');
                actionButton.classList.remove('hidden');
                initCamera();
            } else if (mode === 'upload') {
                imagePreview.classList.remove('hidden');
                document.getElementById('uploadControls').classList.remove('hidden');
                processImageButton.classList.remove('hidden');
            } else if (mode === 'video') {
                videoPlayer.classList.remove('hidden');
                document.getElementById('videoUploadControls').classList.remove('hidden');
                videoInferenceButton.classList.remove('hidden');
            }
            clearCanvas();
        }

        videoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            videoPlayer.src = url;
            clearCanvas();
        });

        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                uploadedImageBase64 = event.target.result;
                imagePreview.src = uploadedImageBase64;
                clearCanvas();
            };
            reader.readAsDataURL(file);
        });

        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
            } catch (err) { console.error(err); }
        }

        function clearCanvas() {
            const ctx = detectionCanvas.getContext('2d');
            ctx.clearRect(0, 0, detectionCanvas.width, detectionCanvas.height);
        }

        async function performInference() {
            if (isProcessing && (currentMode === 'upload' || currentMode === 'video') && !isProcessingLoop) return;
            
            const startTime = performance.now();
            const base64 = captureFrame();
            if (!base64) return;

            statusIndicator.classList.add('status-active');
            statusText.textContent = "Processing...";
            clearCanvas();

            const instruction = instructionText.value || "What do you see?";
            
            debugStatus.textContent = "Sending " + (base64.length/1024).toFixed(1) + "KB to " + baseURL.value;

            try {
                const response = await fetch(`${baseURL.value}/v1/chat/completions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "image_url", image_url: { url: base64 } },
                                    { type: "text", text: `<image>\n${instruction}` }
                                ]
                            }
                        ],
                        temperature: 0.1,
                        max_tokens: 256,
                        stop: ["<|im_start|>", "<|im_end|>", "<end_of_utterance>", "User:", "Assistant:"]
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                const content = data.choices[0].message.content.trim();
                responseText.value = content;
                
                // Parse and draw bounding boxes if any
                drawBoundingBoxes(content);
                
            } catch (err) {
                responseText.value = `Error: ${err.message}`;
            } finally {
                statusIndicator.classList.remove('status-active');
                statusText.textContent = currentMode === 'live' ? "Live" : "Idle";
                
                // Calculate and display Latency/FPS
                const endTime = performance.now();
                const latency = Math.round(endTime - startTime);
                const fps = (1000 / latency).toFixed(1);
                fpsDisplay.textContent = `⚡ ${latency}ms (${fps} FPS)`;
            }
        }

        function drawBoundingBoxes(text) {
            // Regex for SmolVLM standard coordinate format: [<y1>, <x1>, <y2>, <x2>] or similar
            // Coordinates are usually 0-1000 normalized
            const boxRegex = /\[\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\]/g;
            const boxes = [];
            let match;
            
            while ((match = boxRegex.exec(text)) !== null) {
                boxes.push({
                    y1: parseInt(match[1]),
                    x1: parseInt(match[2]),
                    y2: parseInt(match[3]),
                    x2: parseInt(match[4])
                });
            }

            if (boxes.length === 0) return;

            const ctx = detectionCanvas.getContext('2d');
            const w = detectionCanvas.width;
            const h = detectionCanvas.height;

            boxes.forEach(box => {
                // Denormalize 0-1000 to pixels
                const x = (box.x1 / 1000) * w;
                const y = (box.y1 / 1000) * h;
                const width = ((box.x2 - box.x1) / 1000) * w;
                const height = ((box.y2 - box.y1) / 1000) * h;

                ctx.strokeStyle = '#22c55e';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, width, height);

                // Label background
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(x, y - 20, 80, 20);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 12px Inter';
                ctx.fillText('DETECTED', x + 5, y - 5);
            });
        }

        function captureFrame() {
            let target;
            if (currentMode === 'live') target = video;
            else if (currentMode === 'upload') target = imagePreview;
            else if (currentMode === 'video') target = videoPlayer;

            if (currentMode === 'live' && (!stream || !video.videoWidth)) return null;
            if (currentMode === 'upload' && !uploadedImageBase64) return null;
            if (currentMode === 'video' && !videoPlayer.src) return null;

            const isVideo = currentMode === 'live' || currentMode === 'video';
            const sourceW = isVideo ? target.videoWidth : target.naturalWidth;
            const sourceH = isVideo ? target.videoHeight : target.naturalHeight;
            
            if (!sourceW || !sourceH) return null;

            processingCanvas.width = 512; // SmolVLM is trained on 512x512
            processingCanvas.height = 512;
            
            detectionCanvas.width = target.clientWidth;
            detectionCanvas.height = target.clientHeight;
            
            const ctx = processingCanvas.getContext('2d');
            ctx.drawImage(target, 0, 0, 512, 512);
            return processingCanvas.toDataURL('image/jpeg', 0.8);
        }

        let isProcessingLoop = false;
        function handleStart() {
            isProcessing = true;
            isProcessingLoop = true;
            
            const btn = currentMode === 'live' ? actionButton : videoInferenceButton;
            btn.textContent = currentMode === 'live' ? "Stop Live Stream" : "Stop Video Inference";
            btn.classList.replace('btn-primary', 'btn-danger');
            
            if (currentMode === 'video') videoPlayer.play();
            
            performInference();
            intervalId = setInterval(performInference, 2000);
        }

        function handleStop() {
            isProcessing = false;
            isProcessingLoop = false;
            if (intervalId) { clearInterval(intervalId); intervalId = null; }
            
            actionButton.textContent = "Start Live Stream";
            actionButton.classList.replace('btn-danger', 'btn-primary');
            
            videoInferenceButton.textContent = "Start Video Inference";
            videoInferenceButton.classList.replace('btn-danger', 'btn-primary');
            
            if (currentMode === 'video') videoPlayer.pause();
        }

        actionButton.addEventListener('click', () => isProcessing ? handleStop() : handleStart());
        videoInferenceButton.addEventListener('click', () => isProcessing ? handleStop() : handleStart());
        processImageButton.addEventListener('click', performInference);

        window.addEventListener('DOMContentLoaded', () => { initCamera(); });
    </script>
</body>
</html>
